<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/global.css">
    <script src="index.js" defer></script>
    <title>WeatherApp</title>
</head>
<body>
    <form class="weatherForm"  action="">
        <input type="text" class="cityInput" placeholder="Type the city...">
        <button type="submit">Get Weather</button>
    </form>
    <div class="card" >
        <h1 class="cityDisplay">Miami</h1>
        <p class="tempDisplay">30°C</p>
        <p class="humidityDisplay">Humidity: 75%</p>
        <p class="descDisplay">Clear Skys</p>
        <p class="weatherEmoji">☀️</p>
        <p class="errorDisplay">Please enter a city</p>
    </div>
</body>
</html>
